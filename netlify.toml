# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/
#
# If logs show "Next.js Middleware Handler" + AbortError and SSR Duration: 30000 ms,
# the Node handler hit the platform time limit while waiting (often Postgres). Fix
# DATABASE_URL / pooler / NODE_OPTIONS=--dns-result-order=ipv4first, and raise the
# function timeout in Netlify UI (Site configuration → Functions) if your plan allows.
[build]
  # Ensure optional deps are installed (Tailwind v4 uses lightningcss native binary on Linux).
  # Use `npm install` (not `npm ci`) so Netlify's Linux build resolves the correct optional binary.
  command = "npm install --include=optional --no-audit --no-fund && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"
  npm_config_optional = "true"
  npm_config_omit = ""

# Native N-API addon: keep installable on Netlify’s Linux build + function runtime.
[functions]
  external_node_modules = ["@node-rs/argon2"]

[[plugins]]
  package = "@netlify/plugin-nextjs"